<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>HTML 기초</title>
  <link rel="stylesheet" href="style.css">
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  
  <!-- Confetti (축하 효과) Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

  <header>
    <div class="header-left">
      <button id="menuOpenBtn" class="hamburger-btn">☰</button>
      <h1>🎓 HTML 기초</h1>
    </div>
    
    <div class="header-right">
      <label class="switch-label">
        <span id="modeLabelTheory" class="active">📖 개념 학습</span>
        <div class="switch">
          <input type="checkbox" id="modeToggleBtn">
          <span class="slider round"></span>
        </div>
        <span id="modeLabelPractice">💻 실습 미션</span>
      </label>
    </div>
  </header>

  <!-- 배경 오버레이 (사이드바 열렸을 때 뒷배경 어둡게) -->


  <!-- 왼쪽: 목차 (사이드바 - 이제 플로팅으로 띄움) -->
  <main class="container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>📚 목차 (HTML)</h2>
        <button id="menuCloseBtn" class="toggle-btn" title="목차 닫기">✖</button>
      </div>
      <ul id="lessonList" class="lesson-list">
        <!-- JS로 동적 생성될 리스트 -->
      </ul>
    </aside>

    <!-- 중앙-왼쪽: 이론 설명 영역 -->
    <section class="panel theory-panel">
      <div class="theory-header">
        <h2 id="theoryTitle">이론 설명</h2>
        <div id="missionNav" class="mission-nav" style="display: none;">
          <button id="prevMissionBtn" class="nav-btn" disabled>&lt; 이전</button>
          <span id="missionProgress">1 / 1</span>
          <button id="nextMissionBtn" class="nav-btn">다음 &gt;</button>
        </div>
      </div>
      <div id="theoryContent" class="theory-content">
        <!-- JS로 동적 렌더링될 영역 -->
      </div>
    </section>

    <!-- 중앙-오른쪽: 코드 에디터 영역 -->
    <section class="panel editor-panel">
      <div class="panel-header">
        <h2>📝 실습 에디터 (HTML)</h2>
        <div class="editor-actions">
          <button id="showAnswerBtn" class="action-btn warning-btn" style="display: none;">💡 정답 보기</button>
          <button id="checkAnswerBtn" class="action-btn success-btn" style="display: none;">🚀 정답 확인</button>
          <button id="copyCodeBtn" class="action-btn">📋 코드 복사</button>
        </div>
      </div>
      <textarea id="htmlEditor"></textarea>
    </section>

    <!-- 가장 우측: 실시간 미리보기 영역 -->
    <section class="panel preview-panel">
      <h2>👀 결과 화면</h2>
      <div class="iframe-container">
        <iframe id="previewIframe" title="Live Preview"></iframe>
      </div>
    </section>
  </main>

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
  <!-- 커스텀 JS -->
  <script src="script.js"></script>
</body>

</html>
